<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-present { background-color: #d4edda; }
        .status-absent { background-color: #f8d7da; }
        .status-half-day { background-color: #fff3cd; }
        .status-leave { background-color: #cce5ff; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>My Attendance</h2>
        <div class="row mb-3">
            <div class="col-md-6">
                <h5>Today's Check-in/out</h5>
                <button id="checkInBtn" class="btn btn-success">Check In</button>
                <button id="checkOutBtn" class="btn btn-danger">Check Out</button>
                <span id="checkStatus" class="ms-3"></span>
            </div>
            <div class="col-md-6 text-end">
                <a href="dashboard.html" class="btn btn-secondary">← Dashboard</a>
            </div>
        </div>
        <div class="mb-3">
            <label>Select Month: <input type="month" id="monthPicker" class="form-control d-inline-block w-auto"></label>
        </div>
        <table class="table table-bordered">
            <thead>
                <tr><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th></tr>
            </thead>
            <tbody id="attendanceTable"></tbody>
        </table>
        <div id="message" class="mt-2"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const monthPicker = document.getElementById('monthPicker');
            const today = new Date();
            monthPicker.value = today.toISOString().slice(0, 7);
            loadAttendance(monthPicker.value);

            monthPicker.addEventListener('change', () => {
                loadAttendance(monthPicker.value);
            });

            document.getElementById('checkInBtn').addEventListener('click', async () => {
                await recordAttendance('present', '09:00:00', null);
            });
            document.getElementById('checkOutBtn').addEventListener('click', async () => {
                await recordAttendance('present', null, '18:00:00');
            });
        });

        async function loadAttendance(month) {
            const [year, monthNum] = month.split('-');
            const start = `${year}-${monthNum}-01`;
            const end = `${year}-${monthNum}-${new Date(year, monthNum, 0).getDate()}`;
            try {
                const data = await apiCall('attendance', 'GET', null, { start, end });
                const tbody = document.getElementById('attendanceTable');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No records</td></tr>';
                    return;
                }
                data.forEach(rec => {
                    const row = document.createElement('tr');
                    row.className = `status-${rec.status}`;
                    row.innerHTML = `
                        <td>${rec.date}</td>
                        <td>${rec.status}</td>
                        <td>${rec.check_in || '-'}</td>
                        <td>${rec.check_out || '-'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        async function recordAttendance(status, checkIn, checkOut) {
            const today = new Date().toISOString().slice(0,10);
            const payload = { date: today, status, check_in: checkIn, check_out: checkOut };
            try {
                await apiCall('attendance', 'POST', payload);
                document.getElementById('checkStatus').innerHTML = '<span class="text-success">✔ Recorded</span>';
                loadAttendance(document.getElementById('monthPicker').value);
            } catch (err) {
                document.getElementById('checkStatus').innerHTML = `<span class="text-danger">❌ ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
