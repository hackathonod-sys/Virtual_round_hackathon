<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .payroll-card {
            max-width: 500px;
            margin: 0 auto;
        }
        .net-salary {
            font-size: 2rem;
            font-weight: bold;
            color: #0d6efd;
        }
        .label {
            font-weight: 600;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-wallet"></i> My Payroll</h2>
            <a href="dashboard.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="empPayrollMonth" class="form-label">Select Month</label>
                    <input type="month" id="empPayrollMonth" class="form-control">
                </div>
                <button id="loadEmpPayroll" class="btn btn-primary w-100"><i class="fas fa-search"></i> View</button>
            </div>
        </div>

        <div id="payrollResult" class="mt-4">
            <div class="text-center text-muted">Select a month and click View</div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('empPayrollMonth').value = `${year}-${month}`;

            document.getElementById('loadEmpPayroll').addEventListener('click', loadEmployeePayroll);
            // Auto-load on first visit
            loadEmployeePayroll();
        });

        async function loadEmployeePayroll() {
            const monthYear = document.getElementById('empPayrollMonth').value;
            if (!monthYear) {
                showToast('Please select a month', 'warning');
                return;
            }
            const [year, month] = monthYear.split('-');
            const resultDiv = document.getElementById('payrollResult');
            resultDiv.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            try {
                const data = await apiCall('payroll', 'GET', null, { month, year });
                // The API returns either an object with basic, allowance, deduction, net, status, pay_date
                // or { error: 'No payroll found' }
                if (data.error) {
                    resultDiv.innerHTML = `
                        <div class="alert alert-warning text-center">
                            <i class="fas fa-exclamation-triangle"></i> ${data.error}
                        </div>
                    `;
                    return;
                }
                // Display payroll card
                resultDiv.innerHTML = `
                    <div class="card payroll-card shadow">
                        <div class="card-body">
                            <h5 class="card-title text-center">Payroll for ${new Date(monthYear + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h5>
                            <hr>
                            <div class="row">
                                <div class="col-6"><span class="label">Basic</span></div>
                                <div class="col-6 text-end">$${parseFloat(data.basic || 0).toFixed(2)}</div>
                            </div>
                            <div class="row">
                                <div class="col-6"><span class="label">Allowance</span></div>
                                <div class="col-6 text-end">$${parseFloat(data.allowance || 0).toFixed(2)}</div>
                            </div>
                            <div class="row">
                                <div class="col-6"><span class="label">Deduction</span></div>
                                <div class="col-6 text-end">$${parseFloat(data.deduction || 0).toFixed(2)}</div>
                            </div>
                            <hr>
                            <div class="row">
                                <div class="col-6"><span class="label">Net Pay</span></div>
                                <div class="col-6 text-end net-salary">$${parseFloat(data.net || 0).toFixed(2)}</div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-6"><span class="label">Status</span></div>
                                <div class="col-6 text-end">
                                    <span class="badge bg-${data.status === 'paid' ? 'success' : data.status === 'generated' ? 'primary' : 'warning'}">
                                        ${data.status || 'draft'}
                                    </span>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-6"><span class="label">Pay Date</span></div>
                                <div class="col-6 text-end">${data.pay_date ? new Date(data.pay_date).toLocaleDateString() : '-'}</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                showToast(err.message, 'danger');
                resultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0 show`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
    </script>
</body>
</html>
