<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves & Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Same as dashboard ── */
        :root {
            --font-primary: 'Poppins', sans-serif;
            --color-bg: #f1f5f9;
            --color-surface: #ffffff;
            --color-primary: #4f46e5;
            --color-primary-dark: #4338ca;
            --color-text: #1e293b;
            --color-text-secondary: #64748b;
            --color-text-muted: #94a3b8;
            --color-border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.07);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.10);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
            --transition-smooth: 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .navbar-custom {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 1.5rem;
            height: 68px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition-smooth);
        }
        .navbar-custom.scrolled { box-shadow: var(--shadow-md); }
        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: -0.02em;
            color: var(--color-primary) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            white-space: nowrap;
        }
        .navbar-brand-custom .brand-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 1.1rem;
        }
        .navbar-toggler-custom {
            border: none;
            background: transparent;
            color: var(--color-text);
            font-size: 1.35rem;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-toggler-custom:hover { color: var(--color-primary); background: #f8fafc; }
        .navbar-toggler-custom:focus { outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
        .nav-link-custom {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-text-secondary) !important;
            padding: 0.55rem 1rem !important;
            border-radius: 8px;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
        }
        .nav-link-custom i { font-size: 0.85rem; width: 18px; text-align: center; }
        .nav-link-custom:hover { color: var(--color-primary) !important; background: #f8fafc; }
        .nav-link-custom.active-link { color: var(--color-primary) !important; background: #eef2ff; font-weight: 600; }
        .nav-links-wrapper {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-wrap: wrap;
        }
        .btn-logout {
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: var(--color-surface);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
        }
        .btn-logout:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; box-shadow: 0 0 0 4px rgba(239,68,68,0.06); }
        .btn-logout i { transition: transform var(--transition-fast); }
        .btn-logout:hover i { transform: translateX(2px); }

        @media (max-width: 991.98px) {
            .navbar-collapse-custom {
                position: absolute;
                top: 68px;
                left: 0;
                right: 0;
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: 1rem 1.5rem;
                box-shadow: var(--shadow-lg);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
                z-index: 1029;
                display: none;
                flex-direction: column;
                gap: 0.3rem;
                animation: slideDown 0.3s cubic-bezier(0.4,0,0.2,1);
            }
            .navbar-collapse-custom.show { display: flex; }
            .nav-links-wrapper { flex-direction: column; gap: 0.2rem; width: 100%; }
            .nav-link-custom { padding: 0.7rem 1rem !important; width: 100%; font-size: 0.95rem; }
            .btn-logout { width: 100%; justify-content: center; margin-top: 0.5rem; }
            .navbar-custom { padding: 0 1rem; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 1.8rem 1.5rem 3rem;
        }

        .profile-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
            animation: fadeInUp 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .profile-card:hover { box-shadow: var(--shadow-md); }
        .btn-primary-custom {
            background: var(--color-primary);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            color: #fff;
            transition: background var(--transition-fast);
        }
        .btn-primary-custom:hover { background: var(--color-primary-dark); }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 0.5rem;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.15s;
        }
        .calendar-day.weekend { background: #f1f5f9; color: #94a3b8; }
        .calendar-day.present { background: #d4edda; border-color: #10b981; color: #065f46; }
        .calendar-day.absent { background: #f8d7da; border-color: #ef4444; color: #991b1b; }
        .calendar-day.half-day { background: #fff3cd; border-color: #f59e0b; color: #92400e; }
        .calendar-day.leave { background: #cce5ff; border-color: #3b82f6; color: #1e3a8a; }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-header {
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            color: var(--color-text-secondary);
            padding: 0.3rem 0;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-right: 1rem;
            font-size: 0.8rem;
        }
        .legend-color { width: 14px; height: 14px; border-radius: 4px; border: 1px solid #cbd5e1; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar-custom" id="mainNavbar">
        <a class="navbar-brand-custom" href="#">
            <span class="brand-icon"><i class="fa-solid fa-building-columns"></i></span>
            HRMS
        </a>
        <button class="navbar-toggler-custom d-lg-none ms-auto me-2" type="button" id="navbarToggler">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="navbar-collapse-custom d-lg-flex align-items-center ms-auto" id="navbarContent">
            <div class="nav-links-wrapper me-lg-3" id="navLinksContainer"></div>
            <button class="btn-logout mt-2 mt-lg-0" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <!-- ═══ MAIN ═══ -->
    <div class="main-container">
        <h2><i class="fa-solid fa-calendar-days" style="color:var(--color-primary);"></i> My Leaves & Attendance</h2>

        <div class="row g-4">
            <!-- Left: Apply & History -->
            <div class="col-lg-6">
                <div class="profile-card">
                    <h5><i class="fa-regular fa-paper-plane"></i> Apply for Leave</h5>
                    <form id="leaveForm">
                        <div class="mb-3">
                            <label>Type</label>
                            <select class="form-select" id="leaveType" required>
                                <option value="paid">Paid</option>
                                <option value="sick">Sick</option>
                                <option value="unpaid">Unpaid</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Start Date</label>
                            <input type="date" class="form-control" id="startDate" required>
                        </div>
                        <div class="mb-3">
                            <label>End Date</label>
                            <input type="date" class="form-control" id="endDate" required>
                        </div>
                        <div class="mb-3">
                            <label>Reason</label>
                            <textarea class="form-control" id="leaveReason" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-primary-custom w-100"><i class="fa-regular fa-paper-plane"></i> Apply</button>
                    </form>
                    <div id="applyMessage" class="mt-3"></div>
                </div>

                <div class="profile-card mt-4">
                    <h5><i class="fa-regular fa-clock"></i> Leave History</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead><tr><th>Type</th><th>From</th><th>To</th><th>Status</th><th>Comment</th></tr></thead>
                            <tbody id="leaveHistory"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right: Calendar -->
            <div class="col-lg-6">
                <div class="profile-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5><i class="fa-regular fa-calendar"></i> Attendance Calendar</h5>
                        <input type="month" id="calendarMonth" class="form-control w-auto" style="max-width:180px;">
                    </div>
                    <div id="calendarContainer">
                        <div class="text-center"><span class="spinner-border spinner-border-sm" role="status"></span> Loading...</div>
                    </div>
                    <div class="mt-3 d-flex flex-wrap">
                        <span class="legend-item"><span class="legend-color" style="background:#d4edda;"></span> Present</span>
                        <span class="legend-item"><span class="legend-color" style="background:#f8d7da;"></span> Absent</span>
                        <span class="legend-item"><span class="legend-color" style="background:#fff3cd;"></span> Half-day</span>
                        <span class="legend-item"><span class="legend-color" style="background:#cce5ff;"></span> Leave</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        (function() {
            // ── Navbar, logout, etc ──
            document.addEventListener('DOMContentLoaded', () => {
                const role = localStorage.getItem('role');
                if (!role) { window.location.href = 'login.html'; return; }
                const navLinksContainer = document.getElementById('navLinksContainer');
                const links = [
                    { href: 'dashboard.html', label: 'Dashboard', icon: 'fa-solid fa-gauge-high' },
                    { href: 'profile.html', label: 'My Profile', icon: 'fa-solid fa-id-card' },
                    { href: 'attendance.html', label: 'Attendance', icon: 'fa-solid fa-clipboard-user' },
                    { href: 'leaves.html', label: 'My Leaves', icon: 'fa-solid fa-calendar-days' },
                    { href: 'salary.html', label: 'Salary', icon: 'fa-solid fa-indian-rupee-sign' },
                    { href: 'announcements.html', label: 'Announcements', icon: 'fa-solid fa-bullhorn' }
                ];
                links.forEach(link => {
                    const a = document.createElement('a');
                    a.className = 'nav-link-custom';
                    a.href = link.href;
                    a.innerHTML = `<i class="${link.icon}"></i> ${link.label}`;
                    if (link.href === 'leaves.html') a.classList.add('active-link');
                    navLinksContainer.appendChild(a);
                });

                // Mobile toggler
                const navbarToggler = document.getElementById('navbarToggler');
                const navbarContent = document.getElementById('navbarContent');
                const togglerIcon = navbarToggler.querySelector('i');
                navbarToggler.addEventListener('click', () => {
                    const isShown = navbarContent.classList.toggle('show');
                    togglerIcon.className = isShown ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
                });
                navLinksContainer.addEventListener('click', (e) => {
                    if (e.target.closest('a') && navbarContent.classList.contains('show')) {
                        navbarContent.classList.remove('show');
                        togglerIcon.className = 'fa-solid fa-bars';
                    }
                });
                window.addEventListener('scroll', () => {
                    document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 10);
                });

                // Logout
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    try { await apiCall('logout', 'POST'); } catch (e) {}
                    localStorage.removeItem('role');
                    window.location.href = 'login.html';
                });

                // ── Leave form ──
                document.getElementById('leaveForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const payload = {
                        type: document.getElementById('leaveType').value,
                        start_date: document.getElementById('startDate').value,
                        end_date: document.getElementById('endDate').value,
                        reason: document.getElementById('leaveReason').value
                    };
                    try {
                        await apiCall('leaves', 'POST', payload);
                        document.getElementById('applyMessage').innerHTML = '<div class="alert alert-success">Leave applied</div>';
                        loadLeaves();
                        document.getElementById('leaveForm').reset();
                    } catch (err) {
                        document.getElementById('applyMessage').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
                    }
                });

                // ── Calendar ──
                const monthInput = document.getElementById('calendarMonth');
                const now = new Date();
                monthInput.value = now.toISOString().slice(0,7);
                monthInput.addEventListener('change', loadCalendar);

                loadLeaves();
                loadCalendar();

                async function loadLeaves() {
                    try {
                        const data = await apiCall('leaves');
                        const tbody = document.getElementById('leaveHistory');
                        tbody.innerHTML = '';
                        if (data.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="5" class="text-center">No leaves</td></tr>';
                            return;
                        }
                        data.forEach(l => {
                            const tr = document.createElement('tr');
                            const badgeClass = l.status === 'pending' ? 'badge-warning' : l.status === 'approved' ? 'badge-success' : 'badge-rose';
                            tr.innerHTML = `
                                <td>${l.type}</td>
                                <td>${l.start_date}</td>
                                <td>${l.end_date}</td>
                                <td><span class="badge ${badgeClass}">${l.status}</span></td>
                                <td>${l.admin_comment || ''}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    } catch (err) {
                        document.getElementById('leaveHistory').innerHTML = `<tr><td colspan="5" class="text-danger">${err.message}</td></tr>`;
                    }
                }

                async function loadCalendar() {
                    const container = document.getElementById('calendarContainer');
                    container.innerHTML = '<div class="text-center"><span class="spinner-border spinner-border-sm" role="status"></span> Loading...</div>';

                    const monthValue = monthInput.value;
                    if (!monthValue) return;
                    const [year, month] = monthValue.split('-');
                    const startDate = `${year}-${month}-01`;
                    const endDate = `${year}-${month}-${new Date(year, month, 0).getDate()}`;

                    try {
                        const attendanceData = await apiCall('attendance', 'GET', null, { start: startDate, end: endDate });
                        const statusMap = {};
                        attendanceData.forEach(rec => { statusMap[rec.date] = rec.status; });

                        // Build calendar
                        const firstDay = new Date(year, month-1, 1);
                        const lastDay = new Date(year, month, 0);
                        const startingDay = firstDay.getDay(); // 0=Sun
                        const daysInMonth = lastDay.getDate();

                        let html = '<div class="calendar-grid">';
                        // Headers
                        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                            html += `<div class="calendar-header">${d}</div>`;
                        });
                        // Empty cells
                        for (let i = 0; i < startingDay; i++) {
                            html += `<div class="calendar-day other-month"></div>`;
                        }
                        // Days
                        for (let d = 1; d <= daysInMonth; d++) {
                            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            const status = statusMap[dateStr] || '';
                            const isWeekend = (new Date(year, month-1, d).getDay() === 0 || new Date(year, month-1, d).getDay() === 6);
                            const cls = `calendar-day ${status} ${isWeekend ? 'weekend' : ''}`;
                            html += `<div class="${cls}" title="${dateStr}: ${status || 'No record'}">${d}</div>`;
                        }
                        html += '</div>';
                        container.innerHTML = html;
                    } catch (err) {
                        container.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
                    }
                }
            });
        })();
    </script>
</body>
</html>
