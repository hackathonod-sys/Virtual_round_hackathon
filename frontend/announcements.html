<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Announcements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ── Root ── */
        :root {
            --font-primary: 'Poppins', sans-serif;
            --color-bg: #f1f5f9;
            --color-surface: #ffffff;
            --color-primary: #4f46e5;
            --color-primary-dark: #4338ca;
            --color-primary-light: #eef2ff;
            --color-text: #1e293b;
            --color-text-secondary: #64748b;
            --color-text-muted: #94a3b8;
            --color-border: #e2e8f0;
            --color-border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-primary);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .navbar-custom {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 1.5rem;
            height: 68px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition-smooth);
        }
        .navbar-custom.scrolled {
            box-shadow: var(--shadow-md);
        }
        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: -0.02em;
            color: var(--color-primary) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            white-space: nowrap;
        }
        .navbar-brand-custom .brand-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 1.1rem;
        }
        .navbar-toggler-custom {
            border: none;
            background: transparent;
            color: var(--color-text);
            font-size: 1.35rem;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-toggler-custom:hover {
            color: var(--color-primary);
            background: #f8fafc;
        }
        .navbar-toggler-custom:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
        .nav-link-custom {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-text-secondary) !important;
            padding: 0.55rem 1rem !important;
            border-radius: 8px;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
        }
        .nav-link-custom i {
            font-size: 0.85rem;
            width: 18px;
            text-align: center;
        }
        .nav-link-custom:hover {
            color: var(--color-primary) !important;
            background: #f8fafc;
        }
        .nav-link-custom.active-link {
            color: var(--color-primary) !important;
            background: var(--color-primary-light);
            font-weight: 600;
        }
        .nav-links-wrapper {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-wrap: wrap;
        }
        .btn-logout {
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: var(--color-surface);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
        }
        .btn-logout:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.06);
        }
        .btn-logout i {
            transition: transform var(--transition-fast);
        }
        .btn-logout:hover i {
            transform: translateX(2px);
        }

        @media (max-width: 991.98px) {
            .navbar-collapse-custom {
                position: absolute;
                top: 68px;
                left: 0;
                right: 0;
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: 1rem 1.5rem;
                box-shadow: var(--shadow-lg);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
                z-index: 1029;
                display: none;
                flex-direction: column;
                gap: 0.3rem;
                animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .navbar-collapse-custom.show {
                display: flex;
            }
            .nav-links-wrapper {
                flex-direction: column;
                gap: 0.2rem;
                width: 100%;
            }
            .nav-link-custom {
                padding: 0.7rem 1rem !important;
                width: 100%;
                font-size: 0.95rem;
            }
            .btn-logout {
                width: 100%;
                justify-content: center;
                margin-top: 0.5rem;
            }
            .navbar-custom {
                padding: 0 1rem;
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Main Container ── */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.8rem 1.5rem 3rem;
        }

        /* ── Page Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .page-header h2 {
            font-weight: 700;
            font-size: 1.65rem;
            letter-spacing: -0.02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text);
        }
        .page-header h2 i {
            color: var(--color-primary);
        }
        .page-header .subtitle {
            color: var(--color-text-secondary);
            font-weight: 400;
            font-size: 0.95rem;
        }
        .page-header .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .page-header .last-update {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #f8fafc;
            padding: 0.3rem 0.85rem;
            border-radius: 20px;
            border: 1px solid var(--color-border);
        }
        .page-header .last-update i {
            font-size: 0.7rem;
            color: #059669;
        }
        .btn-dashboard {
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            border: 1.5px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all var(--transition-fast);
        }
        .btn-dashboard:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--color-primary-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        .btn-dashboard i {
            font-size: 0.8rem;
        }

        /* ── Announcement Cards ── */
        .announce-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            transition: all var(--transition-smooth);
            border-left: 4px solid var(--color-primary);
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }
        .announce-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .announce-card .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .announce-card .card-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--color-text);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .announce-card .card-title .badge-new {
            background: #dc2626;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            letter-spacing: 0.04em;
            animation: pulse 1.5s infinite;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .announce-card .card-meta-top {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .announce-card .card-meta-top i {
            opacity: 0.6;
        }
        .announce-card .card-content {
            color: var(--color-text-secondary);
            margin: 0.5rem 0 0.75rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .announce-card .card-footer-meta {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem 1rem;
            flex-wrap: wrap;
            border-top: 1px solid var(--color-border-light);
            padding-top: 0.5rem;
            margin-top: 0.25rem;
        }
        .announce-card .card-footer-meta i {
            margin-right: 0.2rem;
            opacity: 0.6;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--color-text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--color-text-muted);
            opacity: 0.3;
            margin-bottom: 0.75rem;
            display: block;
        }
        .empty-state h5 {
            font-weight: 600;
            color: var(--color-text);
        }
        .empty-state p {
            font-size: 0.9rem;
            max-width: 380px;
            margin: 0.25rem auto 0;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 380px;
            width: 100%;
        }
        .toast-custom {
            background: var(--color-surface);
            border-radius: var(--radius-sm);
            padding: 0.85rem 1.2rem;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--color-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: toastIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text);
        }
        .toast-custom.danger {
            border-left-color: #dc2626;
        }
        .toast-custom .toast-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .toast-custom.danger .toast-icon {
            color: #dc2626;
        }
        .toast-custom .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0.25rem;
            transition: color var(--transition-fast);
        }
        .toast-custom .toast-close:hover {
            color: var(--color-text);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(24px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── Animations ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .announce-card:nth-child(1) { animation-delay: 0.02s; }
        .announce-card:nth-child(2) { animation-delay: 0.05s; }
        .announce-card:nth-child(3) { animation-delay: 0.08s; }
        .announce-card:nth-child(4) { animation-delay: 0.11s; }
        .announce-card:nth-child(5) { animation-delay: 0.14s; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .page-header h2 {
                font-size: 1.3rem;
            }
            .announce-card {
                padding: 1rem;
            }
            .announce-card .card-header-row {
                flex-direction: column;
                align-items: stretch;
            }
            .announce-card .card-meta-top {
                white-space: normal;
                font-size: 0.7rem;
            }
        }
        @media (max-width: 576px) {
            .main-container {
                padding: 1rem 0.75rem 2rem;
            }
            .page-header .header-actions {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }
            .page-header .last-update {
                justify-content: center;
            }
            .btn-dashboard {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar-custom" id="mainNavbar">
        <a class="navbar-brand-custom" href="#">
            <span class="brand-icon"><i class="fa-solid fa-building-columns"></i></span>
            HRMS
        </a>
        <button class="navbar-toggler-custom d-lg-none ms-auto me-2" type="button" id="navbarToggler">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="navbar-collapse-custom d-lg-flex align-items-center ms-auto" id="navbarContent">
            <div class="nav-links-wrapper me-lg-3" id="navLinksContainer"></div>
            <button class="btn-logout mt-2 mt-lg-0" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <!-- ═══ MAIN ═══ -->
    <div class="main-container">

        <!-- Page Header -->
        <div class="page-header">
            <h2>
                <i class="fa-solid fa-bullhorn"></i> Announcements
                <span class="subtitle">· Latest updates from HR</span>
            </h2>
            <div class="header-actions">
                <span class="last-update">
                    <i class="fa-regular fa-circle-check"></i>
                    <span id="lastUpdate">Updating…</span>
                </span>
                <a href="dashboard.html" class="btn-dashboard">
                    <i class="fa-regular fa-arrow-left"></i> Dashboard
                </a>
            </div>
        </div>

        <!-- Announcements List -->
        <div id="announceList">
            <div class="empty-state">
                <i class="fa-regular fa-bullhorn"></i>
                <h5>No announcements yet</h5>
                <p>Check back later for updates from HR.</p>
            </div>
        </div>
        <div id="message" class="mt-3"></div>
    </div>

    <!-- ═══ TOAST CONTAINER ═══ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ── Navbar & Logout ──
            document.addEventListener('DOMContentLoaded', () => {
                const role = localStorage.getItem('role');
                if (!role) { window.location.href = 'login.html'; return; }

                const navLinksContainer = document.getElementById('navLinksContainer');
                const links = [
                    { href: 'dashboard.html', label: 'Dashboard', icon: 'fa-solid fa-gauge-high' },
                    { href: 'profile.html', label: 'My Profile', icon: 'fa-solid fa-id-card' },
                    { href: 'attendance.html', label: 'Attendance', icon: 'fa-solid fa-clipboard-user' },
                    { href: 'leaves.html', label: 'My Leaves', icon: 'fa-solid fa-calendar-days' },
                    { href: 'salary.html', label: 'Salary', icon: 'fa-solid fa-indian-rupee-sign' },
                    { href: 'announcements.html', label: 'Announcements', icon: 'fa-solid fa-bullhorn' }
                ];
                links.forEach(link => {
                    const a = document.createElement('a');
                    a.className = 'nav-link-custom';
                    a.href = link.href;
                    a.innerHTML = `<i class="${link.icon}"></i> ${link.label}`;
                    if (link.href === 'announcements.html') a.classList.add('active-link');
                    navLinksContainer.appendChild(a);
                });

                // Mobile toggler
                const navbarToggler = document.getElementById('navbarToggler');
                const navbarContent = document.getElementById('navbarContent');
                const togglerIcon = navbarToggler.querySelector('i');
                navbarToggler.addEventListener('click', () => {
                    const isShown = navbarContent.classList.toggle('show');
                    togglerIcon.className = isShown ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
                });
                navLinksContainer.addEventListener('click', (e) => {
                    if (e.target.closest('a') && navbarContent.classList.contains('show')) {
                        navbarContent.classList.remove('show');
                        togglerIcon.className = 'fa-solid fa-bars';
                    }
                });
                window.addEventListener('scroll', () => {
                    document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 10);
                });

                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    try { await apiCall('logout', 'POST'); } catch (_) {}
                    localStorage.removeItem('role');
                    window.location.href = 'login.html';
                });

                // ── Live Announcements Logic ──
                let intervalId = null;
                let lastFetchTime = 0;

                // Load on page load
                loadAnnouncements();

                // Auto-refresh every 25 seconds
                intervalId = setInterval(loadAnnouncements, 25000);

                // Pause when tab hidden
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        clearInterval(intervalId);
                    } else {
                        intervalId = setInterval(loadAnnouncements, 25000);
                        loadAnnouncements(); // immediate refresh
                    }
                });

                // ── Load Announcements ──
                async function loadAnnouncements() {
                    try {
                        const data = await apiCall('announcements');
                        const container = document.getElementById('announceList');
                        container.innerHTML = '';
                        if (data.length === 0) {
                            container.innerHTML = `
                                <div class="empty-state">
                                    <i class="fa-regular fa-bullhorn"></i>
                                    <h5>No announcements yet</h5>
                                    <p>Check back later for updates from HR.</p>
                                </div>
                            `;
                        } else {
                            data.forEach((a, index) => {
                                const card = document.createElement('div');
                                card.className = 'announce-card';
                                const isNew = (index === 0 && (Date.now() - new Date(a.created_at).getTime() <
                                    60000));
                                const created = new Date(a.created_at).toLocaleString('en-IN', {
                                    day: '2-digit',
                                    month: 'short',
                                    year: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                });

                                card.innerHTML = `
                                    <div class="card-header-row">
                                        <h5 class="card-title">
                                            ${a.title}
                                            ${isNew ? '<span class="badge-new">New</span>' : ''}
                                        </h5>
                                        <span class="card-meta-top">
                                            <i class="fa-regular fa-clock"></i> ${created}
                                        </span>
                                    </div>
                                    <div class="card-content">${a.content}</div>
                                    <div class="card-footer-meta">
                                        <span><i class="fa-regular fa-user"></i> ${a.admin_employee_id || 'Admin'}</span>
                                    </div>
                                `;
                                container.appendChild(card);
                            });
                        }
                        // Update last refresh time
                        const now = new Date();
                        document.getElementById('lastUpdate').textContent = `Last updated: ${now.toLocaleTimeString()}`;
                        lastFetchTime = Date.now();
                    } catch (err) {
                        showToast(err.message, 'danger');
                    }
                }

                // ── Toast ──
                function showToast(message, type = 'success') {
                    const container = document.getElementById('toastContainer');
                    const toast = document.createElement('div');
                    toast.className = `toast-custom ${type}`;
                    const iconMap = {
                        danger: 'fa-regular fa-circle-xmark',
                        warning: 'fa-regular fa-triangle-exclamation',
                        info: 'fa-regular fa-circle-info'
                    };
                    toast.innerHTML = `
                        <span class="toast-icon"><i class="${iconMap[type] || iconMap.info}"></i></span>
                        <span>${message}</span>
                        <button class="toast-close" onclick="this.closest('.toast-custom').remove()">&times;</button>
                    `;
                    container.appendChild(toast);
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4500);
                }
            });
        })();
    </script>
</body>
</html>
