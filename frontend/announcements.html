<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Announcements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .announce-card {
            border-left: 4px solid #0d6efd;
            transition: 0.2s;
        }
        .announce-card:hover {
            background-color: #f8f9fa;
        }
        .badge-new {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        #lastUpdate {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>📢 Announcements</h2>
            <div>
                <span id="lastUpdate">Updating...</span>
                <a href="dashboard.html" class="btn btn-secondary ms-2">← Dashboard</a>
            </div>
        </div>
        <div id="announceList"></div>
        <div id="message" class="mt-3"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let intervalId = null;
        let lastFetchTime = 0;

        document.addEventListener('DOMContentLoaded', () => {
            loadAnnouncements();
            // Refresh every 25 seconds
            intervalId = setInterval(loadAnnouncements, 25000);
        });

        async function loadAnnouncements() {
            try {
                const data = await apiCall('announcements');
                const container = document.getElementById('announceList');
                container.innerHTML = '';
                if (data.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">No announcements yet.</div>';
                } else {
                    data.forEach((a, index) => {
                        const card = document.createElement('div');
                        card.className = 'card mb-3 announce-card';
                        const isNew = (index === 0 && (Date.now() - new Date(a.created_at).getTime() < 60000));
                        card.innerHTML = `
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="card-title">${a.title}
                                        ${isNew ? '<span class="badge bg-danger badge-new ms-2">NEW</span>' : ''}
                                    </h5>
                                    <small class="text-muted">${new Date(a.created_at).toLocaleString()}</small>
                                </div>
                                <p class="card-text">${a.content}</p>
                                <p class="card-text"><small class="text-muted">Posted by ${a.admin_employee_id || 'Admin'}</small></p>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }
                // Update last refresh time
                const now = new Date();
                document.getElementById('lastUpdate').textContent = `Last updated: ${now.toLocaleTimeString()}`;
                lastFetchTime = Date.now();
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        // Optional: stop interval when page is hidden (to save resources)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(intervalId);
            } else {
                intervalId = setInterval(loadAnnouncements, 25000);
                loadAnnouncements(); // refresh immediately
            }
        });
    </script>
</body>
</html>
