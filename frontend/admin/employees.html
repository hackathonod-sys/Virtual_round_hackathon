<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Employee Management</h2>
        <div class="row mb-3">
            <div class="col-md-9">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#employeeModal">+ Add Employee</button>
            </div>
            <div class="col-md-3 text-end">
                <a href="../dashboard.html" class="btn btn-secondary">← Dashboard</a>
            </div>
        </div>
        <table class="table table-bordered table-striped">
            <thead>
                <tr><th>ID</th><th>Employee ID</th><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Salary</th><th>Actions</th></tr>
            </thead>
            <tbody id="employeeTable"></tbody>
        </table>
        <div id="message"></div>
    </div>

    <!-- Modal for Add/Edit -->
    <div class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeForm">
                        <input type="hidden" id="editId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Employee ID</label>
                                <input type="text" class="form-control" id="empId" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                        </div>
                        <div class="row" id="passwordField">
                            <div class="col-md-6 mb-3">
                                <label>Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Leave blank to keep unchanged">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Role</label>
                                <select class="form-select" id="role">
                                    <option value="employee">Employee</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Last Name</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Phone</label>
                                <input type="text" class="form-control" id="phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Address</label>
                                <input type="text" class="form-control" id="address">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Job Title</label>
                                <input type="text" class="form-control" id="jobTitle">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Department</label>
                                <input type="text" class="form-control" id="department">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Salary</label>
                                <input type="number" step="0.01" class="form-control" id="salary">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Hire Date</label>
                                <input type="date" class="form-control" id="hireDate">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEmployeeBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        let modal = null;
        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('employeeModal'));
            loadEmployees();

            document.getElementById('saveEmployeeBtn').addEventListener('click', saveEmployee);
        });

        async function loadEmployees() {
            try {
                const data = await apiCall('employees');
                const tbody = document.getElementById('employeeTable');
                tbody.innerHTML = '';
                data.forEach(emp => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${emp.id}</td>
                        <td>${emp.employee_id}</td>
                        <td>${emp.first_name || ''} ${emp.last_name || ''}</td>
                        <td>${emp.email}</td>
                        <td>${emp.role}</td>
                        <td>${emp.department || ''}</td>
                        <td>$${parseFloat(emp.salary || 0).toFixed(2)}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editEmployee(${emp.id})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${emp.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        function editEmployee(id) {
            document.getElementById('editId').value = id;
            document.getElementById('modalTitle').textContent = 'Edit Employee';
            document.getElementById('passwordField').style.display = 'none';
            // Fetch and populate fields
            apiCall(`employees`).then(data => {
                const emp = data.find(e => e.id == id);
                if (emp) {
                    document.getElementById('empId').value = emp.employee_id;
                    document.getElementById('email').value = emp.email;
                    document.getElementById('role').value = emp.role;
                    document.getElementById('firstName').value = emp.first_name || '';
                    document.getElementById('lastName').value = emp.last_name || '';
                    document.getElementById('phone').value = emp.phone || '';
                    document.getElementById('address').value = emp.address || '';
                    document.getElementById('jobTitle').value = emp.job_title || '';
                    document.getElementById('department').value = emp.department || '';
                    document.getElementById('salary').value = emp.salary || '';
                    document.getElementById('hireDate').value = emp.hire_date || '';
                    modal.show();
                }
            });
        }

        function resetForm(isEdit = false) {
            document.getElementById('employeeForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').textContent = 'Add Employee';
            document.getElementById('passwordField').style.display = 'block';
            document.getElementById('password').required = !isEdit;
        }

        document.querySelector('[data-bs-target="#employeeModal"]').addEventListener('click', resetForm);

        async function saveEmployee() {
            const id = document.getElementById('editId').value;
            const payload = {
                employee_id: document.getElementById('empId').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                job_title: document.getElementById('jobTitle').value,
                department: document.getElementById('department').value,
                salary: document.getElementById('salary').value,
                hire_date: document.getElementById('hireDate').value
            };

            try {
                if (id) {
                    // Update – use PUT on employees/{id}
                    await apiCall(`employees/${id}`, 'PUT', payload);
                } else {
                    // Create
                    await apiCall('employees', 'POST', payload);
                }
                modal.hide();
                loadEmployees();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Saved</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        async function deleteEmployee(id) {
            if (!confirm('Delete this employee?')) return;
            try {
                await apiCall(`employees/${id}`, 'DELETE');
                loadEmployees();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Deleted</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
