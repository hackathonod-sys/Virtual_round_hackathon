<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Approvals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Leave Approvals</h2>
        <div class="row mb-3">
            <div class="col-md-9"></div>
            <div class="col-md-3 text-end">
                <a href="../dashboard.html" class="btn btn-secondary">← Dashboard</a>
            </div>
        </div>
        <h4>Pending Requests</h4>
        <table class="table table-bordered">
            <thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Reason</th><th>Action</th></tr></thead>
            <tbody id="pendingLeaves"></tbody>
        </table>
        <h4>All Leaves</h4>
        <table class="table table-bordered">
            <thead><tr><th>Employee</th><th>Type</th><th>Status</th><th>Comment</th></tr></thead>
            <tbody id="allLeaves"></tbody>
        </table>
        <div id="message"></div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function loadLeaves() {
            try {
                // Admin: no user_id -> returns all leaves
                const data = await apiCall('leaves');
                // Pending
                const pending = data.filter(l => l.status === 'pending');
                const tbody = document.getElementById('pendingLeaves');
                tbody.innerHTML = '';
                if (pending.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">No pending requests</td></tr>';
                } else {
                    pending.forEach(l => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${l.employee_id || l.user_id}</td>
                            <td>${l.type}</td>
                            <td>${l.start_date} → ${l.end_date}</td>
                            <td>${l.reason || ''}</td>
                            <td>
                                <button class="btn btn-success btn-sm" onclick="approveLeave(${l.id})">Approve</button>
                                <button class="btn btn-danger btn-sm" onclick="rejectLeave(${l.id})">Reject</button>
                                <input type="text" id="comment_${l.id}" placeholder="Comment" class="form-control-sm">
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
                // All leaves
                const allTbody = document.getElementById('allLeaves');
                allTbody.innerHTML = '';
                data.forEach(l => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${l.employee_id || l.user_id}</td>
                        <td>${l.type}</td>
                        <td><span class="badge bg-${l.status === 'pending' ? 'warning' : l.status === 'approved' ? 'success' : 'danger'}">${l.status}</span></td>
                        <td>${l.admin_comment || ''}</td>
                    `;
                    allTbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        async function approveLeave(id) {
            const comment = document.getElementById(`comment_${id}`).value;
            try {
                await apiCall(`leaves/${id}`, 'PUT', { status: 'approved', admin_comment: comment });
                loadLeaves();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Approved</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        async function rejectLeave(id) {
            const comment = document.getElementById(`comment_${id}`).value;
            try {
                await apiCall(`leaves/${id}`, 'PUT', { status: 'rejected', admin_comment: comment });
                loadLeaves();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Rejected</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        loadLeaves();
    </script>
</body>
</html>
