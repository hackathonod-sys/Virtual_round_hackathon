<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Attendance Management</h2>
        <div class="row mb-3">
            <div class="col-md-6">
                <select id="userSelect" class="form-select">
                    <option value="">All Employees</option>
                </select>
            </div>
            <div class="col-md-6 text-end">
                <a href="../dashboard.html" class="btn btn-secondary">← Dashboard</a>
            </div>
        </div>
        <div class="mb-3">
            <label>Month: <input type="month" id="monthPicker" class="form-control d-inline-block w-auto"></label>
        </div>
        <button class="btn btn-primary mb-2" data-bs-toggle="modal" data-bs-target="#attendanceModal">Add Record</button>
        <table class="table table-bordered table-striped">
            <thead><tr><th>Employee</th><th>Date</th><th>Status</th><th>Check In</th><th>Check Out</th><th>Actions</th></tr></thead>
            <tbody id="attendanceTable"></tbody>
        </table>
        <div id="message"></div>
    </div>

    <!-- Modal for Add/Edit Attendance -->
    <div class="modal fade" id="attendanceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add/Edit Attendance</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="attendanceForm">
                        <input type="hidden" id="attId">
                        <div class="mb-3">
                            <label>Employee</label>
                            <select class="form-select" id="attUser" required></select>
                        </div>
                        <div class="mb-3">
                            <label>Date</label>
                            <input type="date" class="form-control" id="attDate" required>
                        </div>
                        <div class="mb-3">
                            <label>Status</label>
                            <select class="form-select" id="attStatus">
                                <option value="present">Present</option>
                                <option value="absent">Absent</option>
                                <option value="half-day">Half Day</option>
                                <option value="leave">Leave</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Check In</label>
                            <input type="time" class="form-control" id="attCheckIn">
                        </div>
                        <div class="mb-3">
                            <label>Check Out</label>
                            <input type="time" class="form-control" id="attCheckOut">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveAttBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        let modal = null;
        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
            loadEmployeeSelects();
            const monthPicker = document.getElementById('monthPicker');
            monthPicker.value = new Date().toISOString().slice(0,7);
            monthPicker.addEventListener('change', loadAttendance);
            document.getElementById('userSelect').addEventListener('change', loadAttendance);
            document.getElementById('saveAttBtn').addEventListener('click', saveAttendance);
        });

        async function loadEmployeeSelects() {
            const employees = await apiCall('employees');
            const selects = ['userSelect', 'attUser'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '';
                employees.forEach(emp => {
                    const opt = document.createElement('option');
                    opt.value = emp.id;
                    opt.textContent = `${emp.first_name} ${emp.last_name} (${emp.employee_id})`;
                    sel.appendChild(opt);
                });
                if (id === 'userSelect') {
                    const all = document.createElement('option');
                    all.value = '';
                    all.textContent = 'All Employees';
                    sel.prepend(all);
                }
            });
        }

        async function loadAttendance() {
            const userId = document.getElementById('userSelect').value;
            const month = document.getElementById('monthPicker').value;
            const [year, monthNum] = month.split('-');
            const start = `${year}-${monthNum}-01`;
            const end = `${year}-${monthNum}-${new Date(year, monthNum, 0).getDate()}`;
            const params = { start, end };
            if (userId) params.user_id = userId;

            try {
                const data = await apiCall('attendance', 'GET', null, params);
                const tbody = document.getElementById('attendanceTable');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No records</td></tr>';
                    return;
                }
                // Get employee names
                const employees = await apiCall('employees');
                const empMap = {};
                employees.forEach(e => empMap[e.id] = `${e.first_name} ${e.last_name}`);
                data.forEach(rec => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${empMap[rec.user_id] || rec.user_id}</td>
                        <td>${rec.date}</td>
                        <td>${rec.status}</td>
                        <td>${rec.check_in || '-'}</td>
                        <td>${rec.check_out || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editAttendance(${rec.id})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteAttendance(${rec.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        function editAttendance(id) {
            // Fetch the record using the current filter
            const userId = document.getElementById('userSelect').value;
            const month = document.getElementById('monthPicker').value;
            const [year, monthNum] = month.split('-');
            const start = `${year}-${monthNum}-01`;
            const end = `${year}-${monthNum}-${new Date(year, monthNum, 0).getDate()}`;
            const params = { start, end };
            if (userId) params.user_id = userId;

            apiCall('attendance', 'GET', null, params).then(data => {
                const rec = data.find(r => r.id == id);
                if (rec) {
                    document.getElementById('attId').value = rec.id;
                    document.getElementById('attUser').value = rec.user_id;
                    document.getElementById('attDate').value = rec.date;
                    document.getElementById('attStatus').value = rec.status;
                    document.getElementById('attCheckIn').value = rec.check_in || '';
                    document.getElementById('attCheckOut').value = rec.check_out || '';
                    modal.show();
                }
            });
        }

        async function saveAttendance() {
            const id = document.getElementById('attId').value;
            const payload = {
                user_id: document.getElementById('attUser').value,
                date: document.getElementById('attDate').value,
                status: document.getElementById('attStatus').value,
                check_in: document.getElementById('attCheckIn').value || null,
                check_out: document.getElementById('attCheckOut').value || null
            };
            try {
                if (id) {
                    // Since our API doesn't have PUT for attendance, we delete and reinsert
                    await apiCall(`attendance/${id}`, 'DELETE');
                    await apiCall('attendance', 'POST', payload);
                } else {
                    await apiCall('attendance', 'POST', payload);
                }
                modal.hide();
                loadAttendance();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Saved</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        async function deleteAttendance(id) {
            if (!confirm('Delete this record?')) return;
            try {
                await apiCall(`attendance/${id}`, 'DELETE');
                loadAttendance();
                document.getElementById('message').innerHTML = '<div class="alert alert-success">Deleted</div>';
            } catch (err) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
