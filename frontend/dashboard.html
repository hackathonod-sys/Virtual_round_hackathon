<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HRMS Dashboard</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-primary: 'Poppins', sans-serif;
            --color-bg: #f1f5f9;
            --color-surface: #ffffff;
            --color-primary: #4f46e5;
            --color-primary-dark: #4338ca;
            --color-text: #1e293b;
            --color-text-secondary: #64748b;
            --color-text-muted: #94a3b8;
            --color-border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.07), 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.10), 0 8px 16px rgba(0, 0, 0, 0.05);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-primary);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
            line-height: 1.6;
        }

        /* ─── NAVBAR ─── */
        .navbar-custom {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0 1.5rem;
            height: 68px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1030;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition-smooth);
        }
        .navbar-custom.scrolled { box-shadow: var(--shadow-md); }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: -0.02em;
            color: var(--color-primary) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            white-space: nowrap;
        }
        .navbar-brand-custom .brand-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 1.1rem;
        }

        .navbar-toggler-custom {
            border: none;
            background: transparent;
            color: var(--color-text);
            font-size: 1.35rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: transform var(--transition-fast), color var(--transition-fast);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-toggler-custom:hover {
            color: var(--color-primary);
            background: #f8fafc;
        }
        .navbar-toggler-custom:focus { outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }

        .nav-link-custom {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-text-secondary) !important;
            padding: 0.55rem 1rem !important;
            border-radius: 8px;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .nav-link-custom i { font-size: 0.85rem; width: 18px; text-align: center; }
        .nav-link-custom:hover { color: var(--color-primary) !important; background: #f8fafc; }
        .nav-link-custom.active-link { color: var(--color-primary) !important; background: #eef2ff; font-weight: 600; }

        .nav-links-wrapper {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-wrap: wrap;
        }

        .btn-logout {
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: var(--color-surface);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.45rem;
            white-space: nowrap;
        }
        .btn-logout:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
            box-shadow: 0 0 0 4px rgba(239,68,68,0.06);
        }
        .btn-logout i { transition: transform var(--transition-fast); }
        .btn-logout:hover i { transform: translateX(2px); }

        @media (max-width: 991.98px) {
            .navbar-collapse-custom {
                position: absolute;
                top: 68px;
                left: 0;
                right: 0;
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: 1rem 1.5rem;
                box-shadow: var(--shadow-lg);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
                z-index: 1029;
                display: none;
                flex-direction: column;
                gap: 0.3rem;
                animation: slideDown 0.3s cubic-bezier(0.4,0,0.2,1);
            }
            .navbar-collapse-custom.show { display: flex; }
            .nav-links-wrapper { flex-direction: column; gap: 0.2rem; width: 100%; }
            .nav-link-custom { padding: 0.7rem 1rem !important; width: 100%; font-size: 0.95rem; }
            .btn-logout { width: 100%; justify-content: center; margin-top: 0.5rem; }
            .navbar-custom { padding: 0 1rem; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── MAIN ─── */
        .main-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 1.8rem 1.5rem 3rem;
        }

        .dashboard-header { margin-bottom: 2rem; }
        .dashboard-header .welcome-title {
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            color: var(--color-text);
            margin-bottom: 0.2rem;
        }
        .dashboard-header .welcome-subtitle {
            font-weight: 400;
            font-size: 0.95rem;
            color: var(--color-text-secondary);
        }
        .dashboard-header .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 500;
            font-size: 0.82rem;
            color: var(--color-text-muted);
            background: #f8fafc;
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            border: 1px solid var(--color-border);
        }
        .dashboard-header .date-badge i { font-size: 0.75rem; color: var(--color-primary); }

        /* ─── STAT CARDS ─── */
        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem 1.6rem;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            animation: fadeInUp 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
            opacity: 0;
            transform: translateY(20px);
            height: 100%;
            min-height: 140px;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: #cbd5e1;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            transition: height var(--transition-smooth);
        }
        .stat-card:hover::before { height: 6px; }
        .stat-card .card-icon-wrap {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            transition: all var(--transition-bounce);
        }
        .stat-card:hover .card-icon-wrap { transform: scale(1.08); }
        .stat-card .card-value {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.03em;
            color: var(--color-text);
            line-height: 1;
        }
        .stat-card .card-label {
            font-weight: 500;
            font-size: 0.78rem;
            color: var(--color-text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .stat-card .card-sub {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            font-weight: 400;
        }

        .card-accent-blue::before { background: #3b82f6; }
        .card-accent-blue .card-icon-wrap { background: #eff6ff; color: #3b82f6; }
        .card-accent-green::before { background: #10b981; }
        .card-accent-green .card-icon-wrap { background: #ecfdf5; color: #10b981; }
        .card-accent-orange::before { background: #f59e0b; }
        .card-accent-orange .card-icon-wrap { background: #fff7ed; color: #f59e0b; }
        .card-accent-rose::before { background: #f43f5e; }
        .card-accent-rose .card-icon-wrap { background: #fff1f2; color: #f43f5e; }
        .card-accent-purple::before { background: #8b5cf6; }
        .card-accent-purple .card-icon-wrap { background: #f5f3ff; color: #8b5cf6; }
        .card-accent-teal::before { background: #14b8a6; }
        .card-accent-teal .card-icon-wrap { background: #f0fdfa; color: #14b8a6; }
        .card-accent-indigo::before { background: #6366f1; }
        .card-accent-indigo .card-icon-wrap { background: #eef2ff; color: #6366f1; }
        .card-accent-cyan::before { background: #06b6d4; }
        .card-accent-cyan .card-icon-wrap { background: #ecfeff; color: #06b6d4; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── LOADING / ERROR ─── */
        .loading-state, .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            text-align: center;
            color: var(--color-text-secondary);
            gap: 1rem;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-retry {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        .btn-retry:hover { background: var(--color-primary-dark); }

        /* ─── INFO PANEL ─── */
        .info-panel {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem 1.8rem;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-smooth);
            animation: fadeInUp 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .info-panel:hover { box-shadow: var(--shadow-md); }
        .info-panel .panel-title {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.01em;
            color: var(--color-text);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .info-panel .panel-title i { color: var(--color-primary); font-size: 0.9rem; }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid #f8fafc;
            font-size: 0.9rem;
            gap: 1rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-row .info-label { color: var(--color-text-secondary); font-weight: 500; white-space: nowrap; }
        .info-row .info-value { font-weight: 600; color: var(--color-text); text-align: right; }
        .badge-status {
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .badge-success { background: #ecfdf5; color: #059669; }
        .badge-warning { background: #fff7ed; color: #d97706; }
        .badge-info { background: #eff6ff; color: #2563eb; }
        .badge-rose { background: #fff1f2; color: #e11d48; }

        /* Responsive */
        @media (max-width: 1200px) {
            .stat-card .card-value { font-size: 1.7rem; }
            .stat-card { padding: 1.3rem 1.3rem; min-height: 125px; }
            .stat-card .card-icon-wrap { width: 42px; height: 42px; font-size: 1.1rem; border-radius: 10px; }
        }
        @media (max-width: 767.98px) {
            .main-container { padding: 1.2rem 0.9rem 2rem; }
            .dashboard-header .welcome-title { font-size: 1.35rem; }
            .stat-card { padding: 1.1rem 1.2rem; min-height: 110px; gap: 0.4rem; border-radius: var(--radius-md); }
            .stat-card .card-value { font-size: 1.45rem; }
            .stat-card .card-icon-wrap { width: 38px; height: 38px; font-size: 1rem; border-radius: 9px; }
            .info-panel { padding: 1.2rem 1rem; border-radius: var(--radius-md); }
        }
        @media (max-width: 400px) {
            .stat-card { padding: 0.9rem 1rem; min-height: 95px; gap: 0.3rem; border-radius: var(--radius-sm); }
            .stat-card .card-value { font-size: 1.25rem; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- ═══════════════ NAVBAR ═══════════════ -->
    <nav class="navbar-custom" id="mainNavbar">
        <a class="navbar-brand-custom" href="#">
            <span class="brand-icon"><i class="fa-solid fa-building-columns"></i></span>
            HRMS
        </a>

        <button class="navbar-toggler-custom d-lg-none ms-auto me-2" type="button" id="navbarToggler" aria-label="Toggle navigation">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="navbar-collapse-custom d-lg-flex align-items-center ms-auto" id="navbarContent">
            <div class="nav-links-wrapper me-lg-3" id="navLinksContainer"></div>
            <button class="btn-logout mt-2 mt-lg-0" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
    <div class="main-container">
        <div id="dashboardContent">
            <!-- Loading state -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading your dashboard...</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API helper -->
    <script src="js/api.js"></script>

    <script>
        (function() {
            // ── Utility ──────────────────────────────
            const formatCurrency = (amount) => {
                if (amount == null) return '₹0';
                return '₹' + Number(amount).toLocaleString('en-IN');
            };

            const formatNumber = (num) => {
                if (num == null) return '0';
                return Number(num).toLocaleString('en-IN');
            };

            // ── Build dashboards ──────────────────────
            function buildAdminDashboard(data) {
                const now = new Date();
                const formattedDate = now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const formattedTime = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

                const totalEmployees = formatNumber(data.totalEmployees || 0);
                const presentToday = formatNumber(data.presentToday || 0);
                const onLeave = formatNumber(data.onLeave || 0);
                const pendingApprovals = formatNumber(data.pendingApprovals || 0);
                const monthlyPayroll = formatCurrency(data.monthlyPayroll);
                const attendanceRate = data.attendanceRate != null ? data.attendanceRate + '%' : '0%';
                const departments = formatNumber(data.departments || 0);

                const recentLeaves = data.recentLeaveRequests || [];
                let leaveRows = '';
                if (recentLeaves.length > 0) {
                    recentLeaves.forEach(req => {
                        const statusClass = req.status === 'approved' ? 'badge-success' :
                                           req.status === 'rejected' ? 'badge-rose' : 'badge-warning';
                        leaveRows += `
                            <div class="info-row">
                                <span class="info-label">${req.employee_name || 'Unknown'}</span>
                                <span class="info-value">${req.type || 'Leave'} · ${req.days || 0} day(s)</span>
                                <span class="badge-status ${statusClass}">${req.status || 'pending'}</span>
                            </div>`;
                    });
                } else {
                    leaveRows = '<div class="info-row"><span class="info-label" style="width:100%;text-align:center;">No recent requests</span></div>';
                }

                return `
                    <div class="dashboard-header">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                            <div>
                                <h2 class="welcome-title">Welcome back, Admin</h2>
                                <p class="welcome-subtitle">Here's your HR overview at a glance.</p>
                            </div>
                            <span class="date-badge">
                                <i class="fa-regular fa-calendar"></i> ${formattedDate} · ${formattedTime}
                            </span>
                        </div>
                    </div>

                    <div class="row g-3 g-lg-4 mb-4">
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-blue">
                                <div class="card-icon-wrap"><i class="fa-solid fa-users"></i></div>
                                <div class="card-value">${totalEmployees}</div>
                                <div class="card-label">Total Employees</div>
                                <div class="card-sub">Across all departments</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-green">
                                <div class="card-icon-wrap"><i class="fa-solid fa-user-check"></i></div>
                                <div class="card-value">${presentToday}</div>
                                <div class="card-label">Present Today</div>
                                <div class="card-sub">${attendanceRate} attendance rate</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-orange">
                                <div class="card-icon-wrap"><i class="fa-solid fa-calendar-xmark"></i></div>
                                <div class="card-value">${onLeave}</div>
                                <div class="card-label">On Leave</div>
                                <div class="card-sub">Current absentees</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-rose">
                                <div class="card-icon-wrap"><i class="fa-solid fa-clock"></i></div>
                                <div class="card-value">${pendingApprovals}</div>
                                <div class="card-label">Pending Approvals</div>
                                <div class="card-sub">Requires your attention</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 g-lg-4 mb-4">
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-purple">
                                <div class="card-icon-wrap"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                                <div class="card-value">${monthlyPayroll}</div>
                                <div class="card-label">Monthly Payroll</div>
                                <div class="card-sub">For the current month</div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-teal">
                                <div class="card-icon-wrap"><i class="fa-solid fa-chart-line"></i></div>
                                <div class="card-value">${attendanceRate}</div>
                                <div class="card-label">Attendance Rate</div>
                                <div class="card-sub">Company-wide average</div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-indigo">
                                <div class="card-icon-wrap"><i class="fa-solid fa-building"></i></div>
                                <div class="card-value">${departments}</div>
                                <div class="card-label">Departments</div>
                                <div class="card-sub">Active teams & units</div>
                            </div>
                        </div>
                    </div>

                    <div class="info-panel" style="animation-delay:0.5s;">
                        <div class="panel-title">
                            <i class="fa-solid fa-list-check"></i> Recent Leave Requests
                        </div>
                        ${leaveRows}
                    </div>`;
            }

            function buildEmployeeDashboard(data) {
                const now = new Date();
                const formattedDate = now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const formattedTime = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

                const daysPresent = data.daysPresent != null ? `${formatNumber(data.daysPresent)}<span style="font-size:1.2rem;font-weight:400;color:#94a3b8;">/${formatNumber(data.totalWorkingDays || 22)}</span>` : '0/22';
                const leaveBalance = formatNumber(data.leaveBalance || 0);
                const pendingRequests = formatNumber(data.pendingRequests || 0);
                const monthlySalary = formatCurrency(data.monthlySalary);
                const attendanceRate = data.attendanceRate != null ? data.attendanceRate + '%' : '0%';
                const upcomingHolidays = formatNumber(data.upcomingHolidays || 0);
                const newAnnouncements = formatNumber(data.newAnnouncements || 0);

                const recentActivity = data.recentActivity || [];
                let activityRows = '';
                if (recentActivity.length > 0) {
                    recentActivity.forEach(act => {
                        const statusClass = act.status === 'approved' ? 'badge-success' :
                                           act.status === 'rejected' ? 'badge-rose' :
                                           act.status === 'pending' ? 'badge-warning' : 'badge-info';
                        activityRows += `
                            <div class="info-row">
                                <span class="info-label">${act.type || 'Activity'}</span>
                                <span class="info-value">${act.description || ''}</span>
                                <span class="badge-status ${statusClass}">${act.status || 'info'}</span>
                            </div>`;
                    });
                } else {
                    activityRows = '<div class="info-row"><span class="info-label" style="width:100%;text-align:center;">No recent activity</span></div>';
                }

                return `
                    <div class="dashboard-header">
                        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                            <div>
                                <h2 class="welcome-title">Welcome back!</h2>
                                <p class="welcome-subtitle">Here's your personal HR summary.</p>
                            </div>
                            <span class="date-badge">
                                <i class="fa-regular fa-calendar"></i> ${formattedDate} · ${formattedTime}
                            </span>
                        </div>
                    </div>

                    <div class="row g-3 g-lg-4 mb-4">
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-green">
                                <div class="card-icon-wrap"><i class="fa-solid fa-calendar-check"></i></div>
                                <div class="card-value">${daysPresent}</div>
                                <div class="card-label">Days Present</div>
                                <div class="card-sub">This month</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-blue">
                                <div class="card-icon-wrap"><i class="fa-solid fa-umbrella-beach"></i></div>
                                <div class="card-value">${leaveBalance}</div>
                                <div class="card-label">Leave Balance</div>
                                <div class="card-sub">Days remaining</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-orange">
                                <div class="card-icon-wrap"><i class="fa-solid fa-hourglass-half"></i></div>
                                <div class="card-value">${pendingRequests}</div>
                                <div class="card-label">Pending Requests</div>
                                <div class="card-sub">Awaiting approval</div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6 col-12">
                            <div class="stat-card card-accent-purple">
                                <div class="card-icon-wrap"><i class="fa-solid fa-indian-rupee-sign"></i></div>
                                <div class="card-value">${monthlySalary}</div>
                                <div class="card-label">Monthly Salary</div>
                                <div class="card-sub">Gross pay</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 g-lg-4 mb-4">
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-teal">
                                <div class="card-icon-wrap"><i class="fa-solid fa-chart-bar"></i></div>
                                <div class="card-value">${attendanceRate}</div>
                                <div class="card-label">Attendance Rate</div>
                                <div class="card-sub">Your monthly average</div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-cyan">
                                <div class="card-icon-wrap"><i class="fa-solid fa-calendar-star"></i></div>
                                <div class="card-value">${upcomingHolidays}</div>
                                <div class="card-label">Upcoming Holidays</div>
                                <div class="card-sub">In the next 30 days</div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-6 col-12">
                            <div class="stat-card card-accent-indigo">
                                <div class="card-icon-wrap"><i class="fa-solid fa-bullhorn"></i></div>
                                <div class="card-value">${newAnnouncements}</div>
                                <div class="card-label">New Announcements</div>
                                <div class="card-sub">Unread updates</div>
                            </div>
                        </div>
                    </div>

                    <div class="info-panel" style="animation-delay:0.5s;">
                        <div class="panel-title">
                            <i class="fa-solid fa-clock-rotate-left"></i> Recent Activity
                        </div>
                        ${activityRows}
                    </div>`;
            }

            function showErrorState(container, message, retryCallback) {
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:2.5rem;color:#f59e0b;"></i>
                        <p>${message || 'Could not load dashboard data.'}</p>
                        <button class="btn-retry" id="retryBtn">Try Again</button>
                    </div>`;
                document.getElementById('retryBtn').addEventListener('click', retryCallback);
            }

            // ── Main initialization ──────────────────
            document.addEventListener('DOMContentLoaded', async () => {
                const role = localStorage.getItem('role');
                if (!role) {
                    window.location.href = 'login.html';
                    return;
                }

                // Build navigation
                const navLinksContainer = document.getElementById('navLinksContainer');
                let links = [];
                if (role === 'admin') {
                    links = [
                        { href: 'admin/employees.html', label: 'Employees', icon: 'fa-solid fa-users' },
                        { href: 'admin/attendance.html', label: 'Attendance', icon: 'fa-solid fa-clipboard-user' },
                        { href: 'admin/leaves.html', label: 'Leave Approvals', icon: 'fa-solid fa-calendar-check' },
                        { href: 'admin/payroll.html', label: 'Payroll', icon: 'fa-solid fa-indian-rupee-sign' },
                        { href: 'admin/announcements.html', label: 'Announcements', icon: 'fa-solid fa-bullhorn' },
                    ];
                } else {
                    links = [
                        { href: 'profile.html', label: 'My Profile', icon: 'fa-solid fa-id-card' },
                        { href: 'attendance.html', label: 'My Attendance', icon: 'fa-solid fa-clipboard-user' },
                        { href: 'leaves.html', label: 'My Leaves', icon: 'fa-solid fa-calendar-days' },
                        { href: 'salary.html', label: 'Salary', icon: 'fa-solid fa-indian-rupee-sign' },
                        // { href: 'announcements.html', label: 'Announcements', icon: 'fa-solid fa-bullhorn' }
                        { href: 'announcements.html', label: 'Live Feed', icon: 'fa-solid fa-rss' }
                    ];
                }
                links.forEach(link => {
                    const a = document.createElement('a');
                    a.className = 'nav-link-custom';
                    a.href = link.href;
                    a.innerHTML = `<i class="${link.icon}"></i> ${link.label}`;
                    navLinksContainer.appendChild(a);
                });

                // Mobile toggler
                const navbarToggler = document.getElementById('navbarToggler');
                const navbarContent = document.getElementById('navbarContent');
                const togglerIcon = navbarToggler.querySelector('i');
                navbarToggler.addEventListener('click', () => {
                    const isShown = navbarContent.classList.toggle('show');
                    togglerIcon.className = isShown ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
                    togglerIcon.style.transform = isShown ? 'rotate(90deg)' : 'rotate(0deg)';
                });
                navLinksContainer.addEventListener('click', (e) => {
                    if (e.target.closest('a') && navbarContent.classList.contains('show')) {
                        navbarContent.classList.remove('show');
                        togglerIcon.className = 'fa-solid fa-bars';
                        togglerIcon.style.transform = 'rotate(0deg)';
                    }
                });

                // Navbar shadow on scroll
                window.addEventListener('scroll', () => {
                    document.getElementById('mainNavbar').classList.toggle('scrolled', window.scrollY > 10);
                });

                // Logout
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    try { await apiCall('logout', 'POST'); } catch (e) {}
                    localStorage.removeItem('role');
                    window.location.href = 'login.html';
                });

                // ── Load dashboard data ──
                const container = document.getElementById('dashboardContent');
                const loadData = async () => {
                    container.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading your dashboard...</p></div>`;
                    try {
                        // Call the new dashboard endpoint (no additional params needed)
                        const data = await apiCall('dashboard', 'GET');
                        const html = role === 'admin' ? buildAdminDashboard(data) : buildEmployeeDashboard(data);
                        container.innerHTML = html;
                        // Re-trigger animations
                        const cards = container.querySelectorAll('.stat-card');
                        cards.forEach((card, i) => {
                            card.style.animation = 'none';
                            card.offsetHeight;
                            card.style.animation = `fadeInUp 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards`;
                            card.style.animationDelay = `${0.05 + i * 0.07}s`;
                        });
                        const panel = container.querySelector('.info-panel');
                        if (panel) {
                            panel.style.animation = 'none';
                            panel.offsetHeight;
                            panel.style.animation = `fadeInUp 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards`;
                            panel.style.animationDelay = '0.5s';
                        }
                    } catch (error) {
                        showErrorState(container, 'Unable to fetch dashboard data. Please check your connection.', loadData);
                    }
                };

                await loadData();
            });
        })();
    </script>
</body>
</html>
