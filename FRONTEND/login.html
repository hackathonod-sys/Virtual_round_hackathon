<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS – Login / Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none; }
    .toast { transition: opacity 0.4s; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center font-sans">

  <!-- Toast container -->
  <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-6">
      <button id="tabLogin" class="flex-1 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600 transition">Login</button>
      <button id="tabRegister" class="flex-1 py-2 text-center font-semibold text-gray-500 hover:text-gray-700 transition">Register</button>
    </div>

    <!-- ========== LOGIN FORM ========== -->
    <div id="loginFormContainer">
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="loginEmail" required class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="you@example.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="loginPassword" required class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="••••••••" />
        </div>
        <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition">Sign In</button>
        <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>

    <!-- ========== REGISTER FORM ========== -->
    <div id="registerFormContainer" class="hidden">
      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Employee ID</label>
          <input type="text" id="regEmpId" required class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="EMP001" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" id="regName" required class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="John Doe" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="regEmail" required class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="john@example.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="regPassword" required minlength="6" class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Min 6 chars" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Role</label>
          <select id="regRole" class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            <option value="employee">Employee</option>
            <option value="admin">Admin / HR</option>
          </select>
        </div>
        <button type="submit" id="registerBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition">Create Account</button>
        <p id="registerError" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    // Assuming frontend/ and backend/ are siblings:
    const API_BASE = '../backend/api/';

    // ============================================================
    //  TOAST
    // ============================================================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast px-6 py-3 rounded shadow-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // ============================================================
    //  API HELPER
    // ============================================================
    async function apiFetch(endpoint, options = {}) {
      const url = API_BASE + endpoint;
      const response = await fetch(url, {
        ...options,
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {})
        },
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      let data;
      try { data = await response.json(); } catch (e) { data = { error: 'Invalid response' }; }
      if (!response.ok) {
        throw new Error(data.message || data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    // ============================================================
    //  SESSION CHECK (optional – redirect if already logged in)
    // ============================================================
    async function checkSession() {
      try {
        const data = await apiFetch('auth.php?action=check');
        if (data.success && data.data && data.data.user_id) {
          // Fetch full user to get role
          const userData = await apiFetch('employees.php?id=' + data.data.user_id);
          if (userData.success) {
            const user = userData.data;
            if (user.role === 'admin' || user.role === 'hr') {
              window.location.href = 'admin/dashboard.html';
            } else {
              window.location.href = 'employee/dashboard.html';
            }
          }
        }
      } catch (e) {
        // Not logged in – stay on page
      }
    }

    // ============================================================
    //  TAB SWITCHING
    // ============================================================
    const loginContainer = document.getElementById('loginFormContainer');
    const registerContainer = document.getElementById('registerFormContainer');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');

    function switchTab(tab) {
      if (tab === 'login') {
        loginContainer.classList.remove('hidden');
        registerContainer.classList.add('hidden');
        tabLogin.className = 'flex-1 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600 transition';
        tabRegister.className = 'flex-1 py-2 text-center font-semibold text-gray-500 hover:text-gray-700 transition';
      } else {
        loginContainer.classList.add('hidden');
        registerContainer.classList.remove('hidden');
        tabRegister.className = 'flex-1 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600 transition';
        tabLogin.className = 'flex-1 py-2 text-center font-semibold text-gray-500 hover:text-gray-700 transition';
      }
    }

    tabLogin.addEventListener('click', () => switchTab('login'));
    tabRegister.addEventListener('click', () => switchTab('register'));

    // ============================================================
    //  LOGIN HANDLER
    // ============================================================
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        loginError.textContent = 'Please fill in all fields.';
        loginError.classList.remove('hidden');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const data = await apiFetch('auth.php?action=login', {
          method: 'POST',
          body: { email, password }
        });
        // data.data contains { id, name, role, employee_id }
        const user = data.data;
        showToast(`Welcome, ${user.name}!`, 'success');

        // Redirect based on role
        setTimeout(() => {
          if (user.role === 'admin' || user.role === 'hr') {
            window.location.href = 'admin/dashboard.html';
          } else {
            window.location.href = 'employee/dashboard.html';
          }
        }, 1200);
      } catch (err) {
        loginError.textContent = err.message || 'Login failed.';
        loginError.classList.remove('hidden');
        showToast(err.message || 'Login failed', 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    // ============================================================
    //  REGISTER HANDLER
    // ============================================================
    const registerForm = document.getElementById('registerForm');
    const registerError = document.getElementById('registerError');
    const registerBtn = document.getElementById('registerBtn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerError.classList.add('hidden');

      const employee_id = document.getElementById('regEmpId').value.trim();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;

      if (!employee_id || !name || !email || !password) {
        registerError.textContent = 'All fields are required.';
        registerError.classList.remove('hidden');
        return;
      }
      if (password.length < 6) {
        registerError.textContent = 'Password must be at least 6 characters.';
        registerError.classList.remove('hidden');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating...';

      try {
        // Register
        await apiFetch('auth.php?action=register', {
          method: 'POST',
          body: { employee_id, name, email, password, role }
        });

        // Auto‑login after registration
        const loginData = await apiFetch('auth.php?action=login', {
          method: 'POST',
          body: { email, password }
        });

        const user = loginData.data;
        showToast(`Account created! Welcome, ${user.name}`, 'success');

        // Redirect
        setTimeout(() => {
          if (user.role === 'admin' || user.role === 'hr') {
            window.location.href = 'admin/dashboard.html';
          } else {
            window.location.href = 'employee/dashboard.html';
          }
        }, 1200);
      } catch (err) {
        registerError.textContent = err.message || 'Registration failed.';
        registerError.classList.remove('hidden');
        showToast(err.message || 'Registration failed', 'error');
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      }
    });

    // ============================================================
    //  INIT – check session on load
    // ============================================================
    checkSession();
  </script>

</body>
</html>
